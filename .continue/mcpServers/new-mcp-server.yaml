name: Local MCP servers
version: 0.0.1
schema: v1

mcpServers:
  # 1) Maven Central dependency lookup (FREE, no API key)
  - name: Maven Deps
    type: stdio
    command: npx
    args:
      - "-y"
      - "mcp-maven-deps"
    env: {}

  # 2) Filesystem access for your project (FREE, no API key)
  - name: Filesystem
    type: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    env: {}