name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  backend:
    name: Backend Test And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlgotradingBot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Run Java Migration Audit
        run: ./gradlew javaMigrationAudit --no-daemon --no-configuration-cache

      - name: Run Backend Tests
        run: ./gradlew test --no-daemon

      - name: Run Backend Build
        run: ./gradlew build --no-daemon -x test

  frontend:
    name: Frontend Lint Test Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check Generated API Contract
        run: npm run contract:check

      - name: Run Frontend Lint
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test -- --watch=false

      - name: Run Frontend Build
        run: npm run build
