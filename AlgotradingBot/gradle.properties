# Gradle Configuration Cache
# Speeds up builds by caching configuration phase
org.gradle.configuration-cache=true

# Build Cache
# Reuses outputs from previous builds
org.gradle.caching=true

# Parallel Execution
# Runs tasks in parallel when possible
org.gradle.parallel=true

# JVM Arguments
# Keep builds fast without letting idle daemons hold on to excessive memory
org.gradle.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=384m -XX:+HeapDumpOnOutOfMemoryError --enable-native-access=ALL-UNNAMED
org.gradle.daemon.idletimeout=900000
