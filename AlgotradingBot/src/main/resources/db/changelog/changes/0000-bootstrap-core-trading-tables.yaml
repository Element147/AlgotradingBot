databaseChangeLog:
  - changeSet:
      id: 0000-create-accounts
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: accounts
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: initial_balance
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: current_balance
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: total_pnl
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: risk_per_trade
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_drawdown_limit
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_account_status
            tableName: accounts
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_account_created
            tableName: accounts
            columns:
              - column:
                  name: created_at

  - changeSet:
      id: 0001-create-backtest-datasets
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: backtest_datasets
      changes:
        - createTable:
            tableName: backtest_datasets
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: original_filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: csv_data
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: row_count
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: symbols_csv
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: data_start
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: data_end
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: checksum_sha256
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: schema_version
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

  - changeSet:
      id: 0002-create-backtest-results
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: backtest_results
      changes:
        - createTable:
            tableName: backtest_results
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: strategy_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: dataset_id
                  type: BIGINT
              - column:
                  name: dataset_name
                  type: VARCHAR(100)
              - column:
                  name: experiment_name
                  type: VARCHAR(120)
              - column:
                  name: experiment_key
                  type: VARCHAR(120)
              - column:
                  name: symbol
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: timeframe
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: initial_balance
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: final_balance
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: sharpe_ratio
                  type: DECIMAL(10,4)
                  constraints:
                    nullable: false
              - column:
                  name: profit_factor
                  type: DECIMAL(10,4)
                  constraints:
                    nullable: false
              - column:
                  name: win_rate
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_drawdown
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: total_trades
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: validation_status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: execution_status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: fees_bps
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: slippage_bps
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: VARCHAR(255)
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_backtest_strategy
            tableName: backtest_results
            columns:
              - column:
                  name: strategy_id
        - createIndex:
            indexName: idx_backtest_symbol
            tableName: backtest_results
            columns:
              - column:
                  name: symbol
        - createIndex:
            indexName: idx_backtest_timestamp
            tableName: backtest_results
            columns:
              - column:
                  name: timestamp

  - changeSet:
      id: 0003-create-paper-orders
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: paper_orders
      changes:
        - createTable:
            tableName: paper_orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: side
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: fill_price
                  type: DECIMAL(20,8)
              - column:
                  name: fees
                  type: DECIMAL(20,8)
              - column:
                  name: slippage
                  type: DECIMAL(20,8)
              - column:
                  name: filled_at
                  type: TIMESTAMP
              - column:
                  name: cancelled_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: paper_orders
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_paper_orders_account
            onDelete: CASCADE
        - createIndex:
            indexName: idx_paper_orders_account
            tableName: paper_orders
            columns:
              - column:
                  name: account_id
        - createIndex:
            indexName: idx_paper_orders_status
            tableName: paper_orders
            columns:
              - column:
                  name: status

  - changeSet:
      id: 0004-create-portfolio
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: portfolio
      changes:
        - createTable:
            tableName: portfolio
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: position_size
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: average_entry_price
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: current_price
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: last_updated
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: portfolio
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_portfolio_account
            onDelete: CASCADE
        - createIndex:
            indexName: idx_portfolio_account
            tableName: portfolio
            columns:
              - column:
                  name: account_id
        - createIndex:
            indexName: idx_portfolio_symbol
            tableName: portfolio
            columns:
              - column:
                  name: symbol
        - createIndex:
            indexName: idx_portfolio_updated
            tableName: portfolio
            columns:
              - column:
                  name: last_updated

  - changeSet:
      id: 0005-create-risk-alerts
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: risk_alerts
      changes:
        - createTable:
            tableName: risk_alerts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: severity
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: action_taken
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_risk_alert_timestamp
            tableName: risk_alerts
            columns:
              - column:
                  name: timestamp

  - changeSet:
      id: 0006-create-risk-config
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: risk_config
      changes:
        - createTable:
            tableName: risk_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: max_risk_per_trade
                  type: DECIMAL(6,4)
                  constraints:
                    nullable: false
              - column:
                  name: max_daily_loss_limit
                  type: DECIMAL(6,4)
                  constraints:
                    nullable: false
              - column:
                  name: max_drawdown_limit
                  type: DECIMAL(6,4)
                  constraints:
                    nullable: false
              - column:
                  name: max_open_positions
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: correlation_limit
                  type: DECIMAL(6,4)
                  constraints:
                    nullable: false
              - column:
                  name: circuit_breaker_active
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: circuit_breaker_reason
                  type: VARCHAR(255)
              - column:
                  name: circuit_breaker_triggered_at
                  type: TIMESTAMP
              - column:
                  name: circuit_breaker_overridden_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 0007-create-strategy-configs
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: strategy_configs
      changes:
        - createTable:
            tableName: strategy_configs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: timeframe
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: risk_per_trade
                  type: DECIMAL(6,4)
                  constraints:
                    nullable: false
              - column:
                  name: min_position_size
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: max_position_size
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: profit_loss
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: trade_count
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: current_drawdown
                  type: DECIMAL(8,4)
                  constraints:
                    nullable: false
              - column:
                  name: paper_mode
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP
              - column:
                  name: stopped_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_strategy_config_name
            tableName: strategy_configs
            unique: true
            columns:
              - column:
                  name: name
        - createIndex:
            indexName: idx_strategy_config_status
            tableName: strategy_configs
            columns:
              - column:
                  name: status

  - changeSet:
      id: 0008-create-trades
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: trades
      changes:
        - createTable:
            tableName: trades
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: signal_type
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: entry_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: exit_time
                  type: TIMESTAMP
              - column:
                  name: entry_price
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: exit_price
                  type: DECIMAL(20,8)
              - column:
                  name: position_size
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: risk_amount
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: stop_loss
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: take_profit
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: pnl
                  type: DECIMAL(20,8)
              - column:
                  name: actual_fees
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: actual_slippage
                  type: DECIMAL(20,8)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: trades
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_trades_account
            onDelete: CASCADE
        - createIndex:
            indexName: idx_trade_account
            tableName: trades
            columns:
              - column:
                  name: account_id
        - createIndex:
            indexName: idx_trade_symbol
            tableName: trades
            columns:
              - column:
                  name: symbol
        - createIndex:
            indexName: idx_trade_entry_time
            tableName: trades
            columns:
              - column:
                  name: entry_time
        - createIndex:
            indexName: idx_trade_exit_time
            tableName: trades
            columns:
              - column:
                  name: exit_time
