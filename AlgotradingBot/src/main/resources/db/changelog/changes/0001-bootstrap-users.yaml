databaseChangeLog:
  - changeSet:
      id: 0001-create-users-table-if-missing
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uk_users_username
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uk_users_email

  - changeSet:
      id: 0002-seed-admin-user-postgresql
      author: codex
      dbms: postgresql
      preConditions:
        onFail: MARK_RAN
        tableExists:
          tableName: users
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              INSERT INTO users (username, password_hash, email, role, enabled, created_at, updated_at)
              VALUES (
                'admin',
                crypt('dogbert', gen_salt('bf', 10)),
                'admin@algotrading.local',
                'ADMIN',
                true,
                NOW(),
                NOW()
              )
              ON CONFLICT (username) DO UPDATE
                SET password_hash = EXCLUDED.password_hash,
                    email = EXCLUDED.email,
                    role = EXCLUDED.role,
                    enabled = EXCLUDED.enabled,
                    updated_at = NOW();

  - changeSet:
      id: 0003-migrate-backtest-dataset-csv-to-bytea
      author: codex
      dbms: postgresql
      preConditions:
        onFail: MARK_RAN
        and:
          - tableExists:
              tableName: backtest_datasets
          - columnExists:
              tableName: backtest_datasets
              columnName: csv_data
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $$
              DECLARE
                csv_data_type TEXT;
              BEGIN
                SELECT data_type
                  INTO csv_data_type
                  FROM information_schema.columns
                 WHERE table_schema = 'public'
                   AND table_name = 'backtest_datasets'
                   AND column_name = 'csv_data';

                IF csv_data_type = 'oid' THEN
                  ALTER TABLE backtest_datasets ADD COLUMN IF NOT EXISTS csv_data_tmp BYTEA;
                  UPDATE backtest_datasets
                     SET csv_data_tmp = lo_get(csv_data)
                   WHERE csv_data IS NOT NULL;
                  ALTER TABLE backtest_datasets DROP COLUMN csv_data;
                  ALTER TABLE backtest_datasets RENAME COLUMN csv_data_tmp TO csv_data;
                END IF;
              END $$;

  - changeSet:
      id: 0004-add-backtest-dataset-reproducibility-columns
      author: codex
      dbms: postgresql
      preConditions:
        onFail: MARK_RAN
        tableExists:
          tableName: backtest_datasets
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE backtest_datasets ADD COLUMN IF NOT EXISTS checksum_sha256 VARCHAR(64);
              ALTER TABLE backtest_datasets ADD COLUMN IF NOT EXISTS schema_version VARCHAR(32);
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              UPDATE backtest_datasets
                 SET checksum_sha256 = COALESCE(checksum_sha256, encode(digest(csv_data, 'sha256'), 'hex')),
                     schema_version = COALESCE(schema_version, 'ohlcv-v1')
               WHERE checksum_sha256 IS NULL
                  OR schema_version IS NULL;
              ALTER TABLE backtest_datasets ALTER COLUMN checksum_sha256 SET NOT NULL;
              ALTER TABLE backtest_datasets ALTER COLUMN schema_version SET NOT NULL;

  - changeSet:
      id: 0005-create-operator-audit-events
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: operator_audit_events
      changes:
        - createTable:
            tableName: operator_audit_events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: actor
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: environment
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: target_type
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: target_id
                  type: VARCHAR(120)
              - column:
                  name: outcome
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: details
                  type: VARCHAR(2000)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_operator_audit_created_at
            tableName: operator_audit_events
            columns:
              - column:
                  name: created_at
        - createIndex:
            indexName: idx_operator_audit_action
            tableName: operator_audit_events
            columns:
              - column:
                  name: action
        - createIndex:
            indexName: idx_operator_audit_environment
            tableName: operator_audit_events
            columns:
              - column:
                  name: environment
